<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicBox — Музыкальный Портал</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0f0f0f; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; }
        header { background: #1f1f1f; padding: 20px; text-align: center; border-bottom: 2px solid #333; }
        .container { max-width: 1000px; margin: 20px auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #1a1a1a; padding: 15px; border-radius: 8px; border: 1px solid #333; transition: 0.3s; }
        .card:hover { border-color: #00ff00; }
        .card h3 { margin-bottom: 10px; color: #00ff00; }
        footer { text-align: center; padding: 40px; color: #666; font-size: 0.8rem; }
        .btn { display: inline-block; background: #00ff00; color: #000; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <h1>MUSICBOX</h1>
    <p>Твой личный музыкальный архив</p>
</header>

<div class="container">
    <div class="grid">
        <div class="card">
            <h3>Треки</h3>
            <p>Список последних добавленных композиций.</p>
            <a href="#" class="btn">Открыть</a>
        </div>
        <div class="card">
            <h3>Плейлисты</h3>
            <p>Твои подборки под любое настроение.</p>
            <a href="#" class="btn">Смотреть</a>
        </div>
        <div class="card">
            <h3>Альбомы</h3>
            <p>Полные релизы любимых исполнителей.</p>
            <a href="#" class="btn">Перейти</a>
        </div>
    </div>
</div>

<footer>
    &copy; 2026 MusicBox. Все права защищены.
</footer>

</body>
</html>
