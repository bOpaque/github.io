<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>VKMusicBox</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: linear-gradient(180deg, #ffffff 0%, #cfcfcf 100%);
            color: #000; 
            font-family: sans-serif; 
            text-align: center; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header { padding: 60px 20px; }
        .header h1 { font-size: 3rem; margin-bottom: 20px; }
        .btn-download { 
            background: #007bff; 
            color: #fff; 
            padding: 20px 45px; 
            text-decoration: none; 
            font-size: 1.5rem; 
            border-radius: 10px;
            display: inline-block;
            font-weight: bold;
        }
        .gallery { 
            max-width: 800px; 
            margin: 20px auto; 
            position: relative; 
            background: #fff;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .slide { display: none; }
        .slide img { width: 100%; display: block; }
        .prev, .next { 
            cursor: pointer; position: absolute; top: 50%; 
            padding: 15px; color: white; background: rgba(0,0,0,0.5); 
            font-weight: bold; margin-top: -25px;
        }
        .next { right: 0; }
        .prev { left: 0; }
    </style>
</head>
<body>
    <div class="header">
        <h1>VKMusicBox</h1>
        <a href="СЮДА_ВСТАВЛЯЙ_ССЫЛКУ" class="btn-download">СКАЧАТЬ</a>
    </div>
    <div class="gallery">
        <div class="slide"><img src="1.jpg"></div>
        <div class="slide"><img src="2.jpg"></div>
        <div class="slide"><img src="3.jpg"></div>
        <a class="prev" onclick="move(-1)">&#10094;</a>
        <a class="next" onclick="move(1)">&#10095;</a>
    </div>
    <script>
        let idx = 1;
        show(idx);
        function move(n) { show(idx += n); }
        function show(n) {
            let s = document.getElementsByClassName("slide");
            if (n > s.length) idx = 1;
            if (n < 1) idx = s.length;
            for (let i = 0; i < s.length; i++) s[i].style.display = "none";
            if(s[idx-1]) s[idx-1].style.display = "block";
        }
    </script>
</body>
</html>
